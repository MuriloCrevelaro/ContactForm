<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Contatos</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <header class="form-header">
        <div class="container container--flex">
            <img class="form-header__image-perfil" src="./images/Vector.png" alt="imagem ilustrativa de um usuario" />
            <h1 class="form-header__title">Contact Form</h1>
            <p class="form-header__text">Insira os dados do contato e clique em cadastrar</p>
        </div>
    </header>
    <main class="DeskTop">
        <div class="conteiner">
            <form class="form-contact" action="">
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="nome">Nome</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input oncl class="form-contact__input form-contact__input--metade" type="text" name="nome" id="nome" placeholder="nome">
                        <input class="form-contact__input form-contact__input--metade" type="text" name="sobrenome"id="sobrenome" placeholder="sobrenome">
                    </div>

                </div>
                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="email">E-mail</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input" type="text" name="email" id="email" placeholder="EX: fulano@gmail.com">
                    </div>
                </div>

                <div class="form-contact__linha">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="telefone">Telefone</label>
                    </div>
                    <div class="form-contact__col-b">
                        <input class="form-contact__input form-contact__input--terso" type="text" name="pais" id="pais" placeholder="+55">
                        <input class="form-contact__input form-contact__input--terso" type="text" name="ddd" id="ddd" placeholder="DDD">
                        <input class="form-contact__input form-contact__input--terso" type="text" name="numero" id="numero" placeholder="EX: 99999-9999">
                    </div>
                </div>

                <div class="form-contact__linha--Endereço">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="endereço">Endereço</label>
                    </div>
                  
                        <div class="form-contact__linha-endereço2">
                            <input class="form-contact__input form-contact__input--quarto" type="text" name="endereço" id="cep" placeholder="cep:9999-999">
                            <input class="form-contact__input form-contact__input--metade" type="text" name="endereço" id="Rua" placeholder="Rua Lá de Casa">
                            <input class="form-contact__input form-contact__input--quarto" type="text" name="endereço" id="numero__casa" placeholder="EX: 555">
                        </div>                    
                </div>
                <div class="form-contact__linha--Endereço">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="endereço"></label>
                    </div>
                        <div class="form-contact__linha-endereço2">
                            <input class="form-contact__input form-contact__input--terso" type="text" name="endereço" id="bloco" placeholder="Apto. 12 BlocoX">
                            <input class="form-contact__input form-contact__input--terso" type="text" name="endereço" id="bairro" placeholder="Bairro">
                            <input class="form-contact__input form-contact__input--terso" type="text" name="endereço" id="cidade" placeholder="Cidade">
                        </div>
                </div>
                <div class="form-contact__linha--Endereço">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="endereço"></label>
                    </div>
                  
                        <div class="form-contact__linha-endereço2">
                            <input class="form-contact__input form-contact__input--terso" type="text" name="endereço" id="estado" placeholder="Estado">
                        </div>         
                </div>
                <div class="form-contact__linha--descrição">
                    <div class="form-contact__col-a">
                        <label class="form-contact__label" for="descrição">Anotações</label>
                    </div>
                    <div class="form-contact__col-b">
                        <textarea class="form-contact__input form-contact__input--descrição" id="anotação" placeholder="Sua anotação aqui"></textarea>
                    </div>

                </div>
            </form>
        </div>
        <div class="botão">
            <button onclick="validarFormulario()">
                Cadastrar
            </button>
            <button>
                Limpar
            </button>
        </div>
        <script src="./js/script.js"></script>
    </main>

    <footer>
        Todos os direitos reservados
    </footer>
</body>

</html>
